name: Deploy PJ Stock AI

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate official stock data
        if: github.event_name != 'push'
        continue-on-error: true
        run: node scripts/update-stock-data.js
        env:
          PJ_STOCK_ALL_TWSE: "1"
          PJ_STOCK_ALL_TPEX: "1"
          PJ_STOCK_BATCH_SIZE: "6"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
